name: Build Plugin

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      plugin_version: ${{ steps.version.outputs.plugin_version }}
      build_number: ${{ steps.version.outputs.build_number }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Calculate plugin version
        id: version
        shell: bash
        run: |
          BASE_VERSION="$(sed -n 's:.*<pluginBaseVersion>\(.*\)</pluginBaseVersion>.*:\1:p' pom.xml | head -n1)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "Invalid pluginBaseVersion '$BASE_VERSION'. Expected numeric major.minor.patch." >&2
            exit 1
          fi

          PATCH=$((PATCH + GITHUB_RUN_NUMBER))
          MINOR=$((MINOR + PATCH / 10))
          PATCH=$((PATCH % 10))
          MAJOR=$((MAJOR + MINOR / 10))
          MINOR=$((MINOR % 10))

          PLUGIN_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          ARTIFACT_NAME="WebhookIntegrations-${PLUGIN_VERSION}.jar"

          echo "plugin_version=${PLUGIN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: >
          mvn -B
          -Drevision=${{ steps.version.outputs.plugin_version }}
          -DpluginBuildNumber=${{ steps.version.outputs.build_number }}
          -DpluginRepository=${{ github.repository }}
          -DpluginRepositoryBranch=${{ github.event.repository.default_branch }}
          verify

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: target/${{ steps.version.outputs.artifact_name }}
          if-no-files-found: error
          retention-days: 14

  release:
    if: github.actor != 'github-actions[bot]' && github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.plugin_version }}
          name: WebhookIntegrations ${{ needs.build.outputs.plugin_version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/${{ needs.build.outputs.artifact_name }}
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Update release metadata files
        shell: bash
        run: |
          printf '%s\n' '${{ needs.build.outputs.build_number }}' > buildnumber
          printf '%s\n' '${{ needs.build.outputs.artifact_name }}' > filename
          printf '%s\n' 'https://github.com/${{ github.repository }}/releases/download/v${{ needs.build.outputs.plugin_version }}/${{ needs.build.outputs.artifact_name }}' > downloadurl

      - name: Commit release metadata
        shell: bash
        run: |
          if git diff --quiet -- buildnumber filename downloadurl; then
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add buildnumber filename downloadurl
          git commit -m 'Update release metadata for ${{ needs.build.outputs.plugin_version }} [skip ci]'
          git push
