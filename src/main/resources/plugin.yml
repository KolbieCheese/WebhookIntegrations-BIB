name: WebhookIntegrations
version: '${project.version}'
softdepend: [PlaceholderAPI, LightweightClans]
main: rudynakodach.github.io.webhookintegrations.WebhookIntegrations
api-version: '1.21'
commands:

  seturl:
    usage: /setUrl <url> <?id>
    permission: webhookintegrations.setwebhookurl

  send:
    usage: /send <?target> <isEmbed> <message>
    permission: webhookintegrations.send

  wi:
    usage: /wi
    permission: webhookintegrations.wi
    aliases:
      - "webhookintegrations"
permissions:
  webhookintegrations.clans.status:
    description: Allows viewing Lightweight Clans bridge status.
    default: op
  webhookintegrations.clans.sync:
    description: Allows queueing a manual Lightweight Clans full sync.
    default: op
